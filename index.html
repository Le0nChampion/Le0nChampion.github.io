<!DOCTYPE html>
<html>
<head>
<title>🔥 Class Demon List 🔥</title>
<style>

body{
  background:#111;
  color:white;
  font-family:Arial;
  margin:0;
  text-align:center;
}

h1{
  font-size:42px;
  color:red;
  text-shadow:0 0 10px red,0 0 25px red;
}

.top-buttons{ margin:15px; }

.switch-btn{
  background:#222;
  border:2px solid #00ff00;
  color:#00ff00;
  padding:10px 18px;
  font-weight:bold;
  border-radius:8px;
  cursor:pointer;
  margin:5px;
  font-size:18px;
  box-shadow:0 0 12px #00ff00;
}

.switch-btn:hover{
  background:#00ff00;
  color:black;
}

.list-container{
  width:95%;
  margin:auto;
  max-height:75vh;
  overflow-y:auto;
}

.hidden{ display:none; }

.level{
  background:#1e1e1e;
  margin:22px 0;
  padding:20px;
  border-radius:14px;
  box-shadow:0 0 15px red;
  display:flex;
  gap:20px;
  align-items:flex-start;
}

.thumbnail{
  width:240px;
  height:140px;
  object-fit:cover;
  border-radius:10px;
  box-shadow:0 0 15px #00ff00;
}

.level-info{ text-align:left; }

.rank{
  font-size:26px;
  font-weight:bold;
}

button{
  background:red;
  border:none;
  color:white;
  padding:6px 14px;
  border-radius:8px;
  font-size:16px;
  cursor:pointer;
  margin-top:8px;
}

/* Sliding Victors */

.victors{
  overflow:hidden;
  transform:translateY(-10px);
  opacity:0;
  max-height:0;
  transition:all .5s ease;
  color:#00ff00;
  text-shadow:0 0 8px #00ff00;
  margin-top:8px;
}

.victors.open{
  transform:translateY(0);
  opacity:1;
  max-height:500px;
}

.crown{
  color:#00ff00;
  animation:crownPulse 1.5s infinite;
}

@keyframes crownPulse{
  0%{text-shadow:0 0 5px #00ff00;}
  50%{text-shadow:0 0 25px #00ff00;}
  100%{text-shadow:0 0 5px #00ff00;}
}

/* Coin Display Styling */
.coin-badge {
  letter-spacing: 2px;
  margin-left: 5px;
  text-shadow: 0 0 8px gold;
}

/* PLAYERS */

.players{
  background:#1e1e1e;
  margin:22px;
  padding:30px;
  border-radius:14px;
  box-shadow:0 0 20px gold;
  font-size:24px;
}

.player{
  margin:15px 0;
  cursor:pointer;
}

.gold-player{
  color:gold;
  animation:goldPulse 1.8s infinite;
}

@keyframes goldPulse{
  0%{text-shadow:0 0 5px gold;}
  50%{text-shadow:0 0 30px gold;}
  100%{text-shadow:0 0 5px gold;}
}

.player-info{
  max-height:0;
  overflow:hidden;
  opacity:0;
  transition:max-height .5s ease, opacity .5s ease;
  background:#222;
  margin-top:10px;
  border-radius:10px;
  padding:0 15px;
  text-align:left;
  font-size: 18px;
  line-height: 1.5;
}

.player-info.open{
  max-height:300px;
  opacity:1;
  padding:15px;
}

/* Point Styling */
.pts-badge {
  color: #00ff00;
  font-weight: bold;
  font-size: 20px;
  text-shadow: 0 0 5px #00ff00;
}

</style>
</head>

<body>

<h1>🔥 Class Demon List 🔥</h1>

<div class="top-buttons">
  <button class="switch-btn" onclick="showClassic()">😈 Classic</button>
  <button class="switch-btn" onclick="showPlayers()">🏆 Best Players</button>
  <button class="switch-btn" onclick="showPlatformer()">🕹️ Platformer</button>
</div>

<div class="list-container">
  <div id="classicList"></div>

  <div id="playersList" class="hidden">
    <div class="players" id="playersContainer"></div>
  </div>

  <div id="platformerList" class="hidden"></div>
</div>

<script>

const difficultyFaces={
  "Easy Demon":"😈",
  "Medium Demon":"👿",
  "Hard Demon":"🔥",
  "Insane Demon":"💀",
  "Extreme Demon":"☠️"
};

let classicLevels=[];
let platformerLevels=[];

function addClassic(name, difficulty, points, thumbnail, victors){
  classicLevels.push({name, difficulty, points, thumbnail, victors});
}

function addPlatformer(name, difficulty, points, thumbnail, victors){
  platformerLevels.push({name, difficulty, points, thumbnail, victors});
}

/* 🔥 ALL CLASSIC LEVELS */
// Decimals work perfectly here now! 
addClassic("Nine Circles", "Hard Demon", 11.16, "NINE.jpg", ["Timur"]);
addClassic("COLOR CRUSHER", "Medium Demon", 6.96, "Screenshot_20260614-202259_YouTube.png", ["Kostia"]);
addClassic("Skeletal Shenanigans", "Medium Demon", 6.68, "skeletal.jpg", ["Timur","Kostia"]);
addClassic("B", "Medium Demon", 5.81, "sddefault.jpg", ["Kostia","Leon"]);
addClassic("Ebb", "Medium Demon", 6.03, "Screenshot_20260614-202840_YouTube.png", ["Kostia"]);
addClassic("bims level", "Medium Demon", 5.08, "Screenshot_20260614-203212_YouTube.png", ["Kostia"]);
addClassic("Deadlocked", "Easy Demon", 0, "FmXs0V1aEAEtWAA.jpg", ["Kostia","Timur"]);
addClassic("Ispywithmylittleeye", "Easy Demon", 1.87, "ISpyWithMyLittleEye_Ball.webp", ["Leon","Timur","Kostia"]);
addClassic("Clubstep", "Easy Demon", 0, "clubstep.jpg", ["Kostia"]);
addClassic("X", "Easy Demon", 3.12, "X.webp", ["Kostia"]);
addClassic("Is", "Easy Demon", 3.04, "Screenshot_20260301-085959_Geode.png", ["Kostia","Timur"]);
addClassic("Maymory", "Easy Demon", 2.09, "maxresdefault (2).jpg", ["Kostia"]);
addClassic("Change of Scene", "Easy Demon", 2.03, "Screenshot_20260614-193906_YouTube.png", ["Kostia"]);
addClassic("FUNKED UP", "Easy Demon", 1.87, "Screenshot_20260613-182805_YouTube.png", ["Kostia"]);
addClassic("Speed Racer", "Easy Demon", 1.86, "Screenshot_20260301-090411_Geode.png", ["Leon","Kostia"]);
addClassic("Weird", "Easy Demon", 1.35, "Screenshot_20260613-182015_YouTube.png", ["Kostia"]);
addClassic("Starpunk", "Easy Demon", 1.3, "maxresdefault.jpg", ["Kostia"]);
addClassic("Shiver", "Easy Demon", 1.15, "Screenshot_20260228-235631_Geode.png", ["Leon","Timur","Kostia","Ruslan"]);
addClassic("Demon Mixed", "Easy Demon", 1.13, "Screenshot_20260301-121527_Geode.png", ["Leon"]);
addClassic("Platinum Adventure", "Easy Demon", 1.1, "PlatinumAdventure.webp", ["Kostia","Timur","Leon","Ruslan"]);
addClassic("The Lightning Road", "Easy Demon", 1.05, "Screenshot_20260301-103353_Geode.png", ["Kostia","Timur","Ruslan","Leon"]);
addClassic("The Nightmare", "Easy Demon", 1.04, "13519.webp", ["Leon","Kostia","Ruslan","Timur"]);

/* 🕹️ PLATFORMER LEVELS */
addPlatformer("Boss Rush 2", "Easy Demon", 0.75, "boss.jpg", ["Leon"]);
addPlatformer("maethrillian", "Easy Demon", 0.6, "mea.jpg", ["Kostia"]);
addPlatformer("would you rather", "Easy Demon", 0.5, "hq720.jpg", ["Kostia"]);

/* Extra Platformer Placeholders */
addPlatformer("Platformer Extra 1", "Medium Demon", 1.5, "placeholder.jpg", ["Kostia"]);
addPlatformer("Platformer Extra 2", "Hard Demon", 3.2, "placeholder.jpg", ["Timur"]);
addPlatformer("Platformer Extra 3", "Insane Demon", 5.0, "placeholder.jpg", []);
addPlatformer("Platformer Extra 4", "Extreme Demon", 10.0, "placeholder.jpg", []);
addPlatformer("Platformer Extra 5", "Easy Demon", 0.5, "placeholder.jpg", []);


function renderList(levels,containerId){
  const container=document.getElementById(containerId);
  container.innerHTML="";
  levels.forEach((level,index)=>{
    const div=document.createElement("div");
    div.className="level";

    const victorsHTML=level.victors.map((v,i)=>{
      const parts = v.split("|");
      const playerName = parts[0];
      const coinCount = parts[1] ? parseInt(parts[1]) : 0;
      const coinHTML = coinCount > 0 ? ` <span class="coin-badge">${'🪙'.repeat(coinCount)}</span>` : '';

      if(i===0) return `${i+1}. <span class="crown">👑 ${playerName}</span>${coinHTML}`;
      return `${i+1}. 😈 ${playerName}${coinHTML}`;
    }).join("<br>");

    // Uses parseFloat to display exact decimal points safely
    div.innerHTML=`
    <img class="thumbnail" src="${level.thumbnail}">
    <div class="level-info">
    <div class="rank">#${index+1}</div>
    <strong>${level.name}</strong><br>
    ${difficultyFaces[level.difficulty]} ${level.difficulty} <span style="color:gray;">(${parseFloat(level.points)} pts)</span><br>
    <button onclick="toggleVictors('${containerId}',${index})">Victors</button>
    <div class="victors" id="${containerId}-victors-${index}">
    ${victorsHTML}
    </div>
    </div>
    `;
    container.appendChild(div);
  });
}

function calculateAndRenderPlayers() {
  const stats = {};

  function processLevelData(levelsArray, isPlatformer) {
    levelsArray.forEach(level => {
      // CRITICAL FIX: Forces the point values to remain exact decimals
      const points = parseFloat(level.points) || 0;
      
      level.victors.forEach(v => {
        const playerName = v.split("|")[0]; 
        
        if (!stats[playerName]) {
          stats[playerName] = { 
            totalPoints: 0, 
            hardestClassic: "None", maxClassicPts: 0, 
            hardestPlatformer: "None", maxPlatformerPts: 0 
          };
        }
        
        stats[playerName].totalPoints += points;

        if (isPlatformer) {
          if (points > stats[playerName].maxPlatformerPts) {
            stats[playerName].maxPlatformerPts = points;
            stats[playerName].hardestPlatformer = level.name;
          }
        } else {
          if (points > stats[playerName].maxClassicPts) {
            stats[playerName].maxClassicPts = points;
            stats[playerName].hardestClassic = level.name;
          }
        }
      });
    });
  }

  processLevelData(classicLevels, false);
  processLevelData(platformerLevels, true);

  const sortedPlayers = Object.entries(stats)
    .map(([name, data]) => ({ name, ...data }))
    .sort((a, b) => b.totalPoints - a.totalPoints);

  const container = document.getElementById("playersContainer");
  container.innerHTML = "";

  const emojis = ["🥇 1.", "🥈 2.", "🥉 3.", "4️⃣ 4.", "5️⃣ 5.", "6️⃣ 6.", "7️⃣ 7.", "8️⃣ 8.", "9️⃣ 9.", "🔟 10."];

  sortedPlayers.forEach((player, index) => {
    const div = document.createElement("div");
    div.className = "player";
    div.setAttribute("onclick", `togglePlayer('p${index}')`);

    const rankPrefix = emojis[index] || `${index + 1}.`;
    const nameClass = index === 0 ? 'class="gold-player"' : '';

    // FIX: .toFixed(2) prevents messy computer math issues, Number() cleans up trailing zeros
    const cleanDisplayPoints = Number(player.totalPoints.toFixed(2));

    div.innerHTML = `
      ${rankPrefix} <span ${nameClass}>${player.name}</span> - <span class="pts-badge">${cleanDisplayPoints} pts</span>
      <div class="player-info" id="p${index}">
        🔹 <strong>Hardest Classic:</strong> ${player.hardestClassic}<br>
        🕹️ <strong>Hardest Platformer:</strong> ${player.hardestPlatformer}
      </div>
    `;
    
    container.appendChild(div);
  });
}

function toggleVictors(containerId,index){
  document.getElementById(containerId+"-victors-"+index).classList.toggle("open");
}

let currentlyOpen=null;
function togglePlayer(id){
  const panel=document.getElementById(id);
  if(currentlyOpen===panel){
    panel.classList.remove("open");
    currentlyOpen=null;
    return;
  }
  if(currentlyOpen){
    currentlyOpen.classList.remove("open");
  }
  panel.classList.add("open");
  currentlyOpen=panel;
}

function showClassic(){
  document.getElementById("classicList").classList.remove("hidden");
  document.getElementById("playersList").classList.add("hidden");
  document.getElementById("platformerList").classList.add("hidden");
}

function showPlayers(){
  document.getElementById("classicList").classList.add("hidden");
  document.getElementById("playersList").classList.remove("hidden");
  document.getElementById("platformerList").classList.add("hidden");
}

function showPlatformer(){
  document.getElementById("classicList").classList.add("hidden");
  document.getElementById("playersList").classList.add("hidden");
  document.getElementById("platformerList").classList.remove("hidden");
}

renderList(classicLevels,"classicList");
renderList(platformerLevels,"platformerList");
calculateAndRenderPlayers();

</script>

</body>
</html>
